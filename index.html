<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b0f1a" />
    <title>Pull Strike</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0f1a;
        color: #e8ecf4;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .stage {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        max-width: 100vw;
        max-height: 100vh;
      }
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #131a2b;
        touch-action: none;
      }
      .ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
        font-size: 13px;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        background: rgba(0,0,0,0.35);
        padding: 8px 12px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
      }
      .footer {
        display: flex;
        gap: 8px;
        justify-content: center;
        pointer-events: auto;
      }
      button {
        pointer-events: auto;
        background: rgba(40,52,80,0.85);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.15);
        padding: 8px 14px;
        border-radius: 8px;
        font: inherit;
        cursor: pointer;
      }
      button:active { transform: scale(0.97); }
      .banner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 28px;
        font-weight: 700;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }
      .banner.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="stage">
        <canvas id="game"></canvas>
        <div class="ui">
          <div class="hud" id="hud">
            <span id="hud-turn">Turn 1</span>
            <span id="hud-phase">aiming</span>
            <span id="hud-enemies">enemies: -</span>
          </div>
          <div class="footer">
            <button id="btn-reset">Reset</button>
            <button id="btn-debug">Debug</button>
          </div>
        </div>
        <div class="banner" id="banner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
