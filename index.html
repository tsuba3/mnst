<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b0f1a" />
    <title>Pull Strike</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f1a;
        --panel: #131a2b;
        --text: #e8ecf4;
        --muted: #94a3b8;
        --primary: #5eead4;
        --primary-ink: #0b0f1a;
        --secondary: rgba(40,52,80,0.85);
        --accent: #fde68a;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .stage {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        max-width: 100vw;
        max-height: 100vh;
        background: var(--panel);
        overflow: hidden;
      }

      /* Scene base */
      .scene {
        position: absolute;
        inset: 0;
      }
      .scene[hidden] { display: none !important; }

      /* Buttons */
      button {
        background: var(--secondary);
        color: var(--text);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 10px 18px;
        border-radius: 10px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: var(--primary);
        color: var(--primary-ink);
        border: none;
      }
      button.secondary {
        background: var(--secondary);
      }
      button:active { transform: scale(0.97); }

      /* Title scene */
      .scene-title {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at top, #1e293b 0%, #0b0f1a 70%);
      }
      .title-inner {
        text-align: center;
        padding: 24px;
      }
      .title-logo {
        font-size: 48px;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .title-sub {
        color: var(--muted);
        margin: 0 0 32px;
      }
      .title-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      .title-buttons button { min-width: 180px; font-size: 18px; padding: 14px 24px; }
      .title-hint {
        margin-top: 32px;
        color: var(--muted);
        font-size: 12px;
      }

      /* OutGame scene */
      .scene-outgame {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .outgame-inner { text-align: center; padding: 24px; }
      .outgame-inner h2 { margin-top: 0; }
      .outgame-inner .muted { color: var(--muted); margin: 0 0 32px; }

      /* InGame scene */
      .scene-ingame canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: var(--panel);
        touch-action: none;
      }
      .scene-ingame .ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 12px;
        font-size: 13px;
      }
      .scene-ingame .hud {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        background: rgba(0,0,0,0.35);
        padding: 8px 12px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
      }
      .scene-ingame .footer {
        display: flex;
        gap: 8px;
        justify-content: center;
        pointer-events: auto;
      }
      .scene-ingame .footer button { padding: 8px 14px; font-size: 13px; }

      .scene-ingame .banner {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        background: rgba(0,0,0,0.4);
      }
      .scene-ingame .banner.show {
        opacity: 1;
        pointer-events: auto;
      }
      .scene-ingame .banner-text {
        font-size: 36px;
        font-weight: 700;
        text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      }
      .scene-ingame .banner-buttons {
        display: flex;
        gap: 12px;
      }
      .scene-ingame .banner-buttons[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="stage">
        <div class="scene scene-title" data-scene="title"></div>
        <div class="scene scene-outgame" data-scene="outgame" hidden></div>
        <div class="scene scene-ingame" data-scene="ingame" hidden></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
